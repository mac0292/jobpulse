<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPulse — Job Market Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

    <nav>
        <a href="/" class="logo">📊 JobPulse</a>
        <div class="nav-links">
            <a href="/"          class="{{ 'active' if request.path == '/' }}">Dashboard</a>
            <a href="/skills"    class="{{ 'active' if request.path == '/skills' }}">Skills</a>
            <a href="/salaries"  class="{{ 'active' if request.path == '/salaries' }}">Salaries</a>
            <a href="/companies" class="{{ 'active' if request.path == '/companies' }}">Companies</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
